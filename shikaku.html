<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>
<body>
  <script>
    var params = new URLSearchParams(window.location.search);
    var row = params.get("row");
    var GAS_URL = "https://script.google.com/macros/s/AKfycbxS34S_dmerUyf56Qar_DJLwpRz7Ya38tOoajBhdn4A_63grMc05U5I-tVbNQl9RQmo/exec";
    var redirectUrl = "https://kdg.onshikaku.org/online-care/index.html?req_type=2&mi_code=a5eb7d9ea64f5a586c93cbab23c4ff753d6de7e8";

    if (row) {
      var iframe = document.createElement("iframe");
      iframe.style.display = "none";
      iframe.src = GAS_URL + "?type=shikaku_log&row=" + row;
      
      var redirected = false;
      iframe.onload = function() {
        if (!redirected) {
          redirected = true;
          window.location.replace(redirectUrl);
        }
      };
      iframe.onerror = function() {
        if (!redirected) {
          redirected = true;
          window.location.replace(redirectUrl);
        }
      };
      document.body.appendChild(iframe);

      setTimeout(function() {
        if (!redirected) {
          redirected = true;
          window.location.replace(redirectUrl);
        }
      }, 3000);
    } else {
      window.location.replace(redirectUrl);
    }
  </script>
</body>
</html>
